- hosts: "{{ target_host }}"
  tasks:
    - name: Ensure container state
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ container_image }}"
        state: "{{ state }}"
        # started: present -> running
        # stopped: present -> stopped
        # absent: container is removed
        # healthy: health check
        # present: container is created
        restart: "{{ restart }}" # true/false
        paused: "{{ paused }}" # true/false
        restart_policy: "{{ restart_policy }}" # on-failure, always, never
        force_kill: "{{ force_kill }}" #true/false
        keep_volumes: "{{ keep_volumes }}" # true/false
        labels: "{{ labels }}"
        env: "{{ env }}"
        env_file: "{{ env_file }}"
